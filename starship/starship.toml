"$schema" = 'https://starship.rs/config-schema.json'
add_newline = false

# Left-side prompt (minimalist)
format = """$directory$character"""
palette = "catppuccin_mocha"

# Right-side prompt (extra info)
right_format = """$cmd_duration$git_status$all"""

command_timeout = 1000

[character]
# Note the use of Catppuccin color 'peach'
success_symbol = "[[¯£æ](white) ÔŞ£](peach)"
error_symbol = "[[¯£æ](red) ÔØ»](peach)"
vimcmd_symbol = "[¯£æ ÔØ«](subtext1)"        # For use with zsh-vi-mode

[directory]
truncate_to_repo = false
truncation_length = 4
truncation_symbol = "ÔÇĞ/"
style = "bold lavender"
read_only = " ¾░î¥ "

# Git entry
[git_metrics]
disabled = false
added_style = "green"
deleted_style = "red"
format = '(\([+$added]($added_style)/[-$deleted]($deleted_style)\)) '

[git_status]
ahead = '[´üó $count](bold green) '
conflicted = '[¾▒íé ](bold red) '
untracked = '[´ä¿ $count](bold purple) '
staged = '[´üğ $count](bold green) '
stashed = '[¯¼® $count](cyan) '
deleted = '[´ü¿ $count](bold red) '
modified = '[¯®│ $count](bold yellow) '
behind = '[´üú $count](bold yellow) '
renamed = '[¾░¼┤ $count](bold blue) '
up_to_date = '[´Çî ](bold green) '
diverged = '[´ü¬ $ahead_count ´üú $behind_count ](bold red) '
format = '([$all_status$ahead_behind]($style))'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style)'
symbol = "¯£Ñ "
style = "bold mauve"

[cmd_duration]
min_time = 10000
format = "[ ¾░Ü¡ $duration ]($style)"
style = "bold yellow"

[hg_branch]
symbol = "´Éİ "

[fossil_branch]
symbol = "´Éİ "

# Gcloud entry
[gcloud]
format = "on [$symbol$domain]($style) "
symbol = "Ôİü´©Å "
style = "bold blue"

