"$schema" = 'https://starship.rs/config-schema.json'
add_newline = false

# Left-side prompt (minimalist)
format = """$directory$character"""
palette = "catppuccin_mocha"

# Right-side prompt (extra info)
right_format = """$cmd_duration$git_status$all"""

command_timeout = 1000

[character]
# Note the use of Catppuccin color 'peach'
success_symbol = "[[󰄛](green) ➜](peach)"
error_symbol = "[[󰄛](red) ❯](peach)"
vimcmd_symbol = "[󰄛 ❮](subtext1)"        # For use with zsh-vi-mode

[directory]
truncate_to_repo = false
truncation_length = 4
truncation_symbol = "…/"
style = "bold lavender"

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style)'
symbol = " "
style = "bold mauve"

[git_status]
format = '([ $all_status$ahead_behind]($style))'
style = "yellow"
conflicted = "⚠️ "
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = "?"
stashed = "📦"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[cmd_duration]
min_time = 500
format = "[ ↻ $duration]($style)"
style = "bold yellow"

[aws]
format = '[$symbol(profile: "$profile" )(\(region: $region\) )]($style)'
disabled = false
style = 'bold blue'
symbol = " "

[golang]
format = '[ ](bold cyan)'

[kubernetes]
symbol = '☸ '
disabled = true
detect_files = ['Dockerfile']
format = '[$symbol$context( \($namespace\))]($style) '
contexts = [
  { context_pattern = "arn:aws:eks:us-west-2:577926974532:cluster/zd-pvc-omer", style = "green", context_alias = "omerxx", symbol = " " },
]

[docker_context]
disabled = true

# Keep your existing Catppuccin Mocha theme
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
