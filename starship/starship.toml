"$schema" = 'https://starship.rs/config-schema.json'
add_newline = false

# Left-side prompt (minimalist)
format = """$directory$character"""
palette = "catppuccin_mocha"

# Right-side prompt (extra info)
right_format = """$cmd_duration$git_status$all"""

command_timeout = 1000

[character]
# Note the use of Catppuccin color 'peach'
success_symbol = "[[≤░Εδ](green) έηε](peach)"
error_symbol = "[[≤░Εδ](red) έζψ](peach)"
vimcmd_symbol = "[≤░Εδ έζχ](subtext1)"        # For use with zsh-vi-mode

[directory]
truncate_to_repo = false
truncation_length = 4
truncation_symbol = "έΑο/"
style = "bold lavender"
read_only = " ≤░Ν╛ "

# Git entry
[git_metrics]
disabled = false
added_style = "green"
deleted_style = "red"
format = '(\([+$added]($added_style)/[-$deleted]($deleted_style)\)) '

[git_status]
ahead = '[ΎΒλ $count](bold green) '
conflicted = '[≤▒κΓ ](bold red) '
untracked = '[ΎΕρ $count](bold purple) '
staged = '[ΎΒπ $count](bold green) '
stashed = '[Όυσ $count](cyan) '
deleted = '[ΎΒρ $count](bold red) '
modified = '[Όσ│ $count](bold yellow) '
behind = '[ΎΒμ $count](bold yellow) '
renamed = '[≤░υ┤ $count](bold blue) '
up_to_date = '[ΎΑΝ ](bold green) '
diverged = '[ΎΒς $ahead_count ΎΒμ $behind_count ](bold red) '
format = '([$all_status$ahead_behind]($style))'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style)'
symbol = "Όεξ "
style = "bold mauve"

[cmd_duration]
min_time = 10000
format = "[ έΗ╗ $duration ]($style)"
style = "bold yellow"

[hg_branch]
symbol = "ΎΡα "

[fossil_branch]
symbol = "ΎΡα "

# Gcloud entry
[gcloud]
format = "on [$symbol$domain]($style) "
symbol = "έαΒΎ╕Π "
style = "bold blue"

[directory.substitutions]
"Documents" = "≤░Ιβ"
"Downloads" = "ΎΑβ "
"Music" = "ΎΑΒ "
"Pictures" = "ΎΑ╛ "
"Repos" = "ΎΡΒ "
"Videos" = "ΎΑ╜ "
"obsidianVault" = "≤░Πς ≤░ιχ "
".config" = "ΎΑΥ "

# Custom entries
[custom.yazi]
description = "Shell launched inside Yazi"
symbol = "ΎΕΧ "
style = "blue bold"
when = """ test -n "$YAZI_LEVEL" """

[custom.neovim]
command = 'bob ls | rg Used | awk "{print \$2}"' # shows output of command
detect_folders = ["lua"]
style = "green"
format = "[Όατ $output ]($style)"
shell = ["bash"]

